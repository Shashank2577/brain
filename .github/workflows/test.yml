name: Test Suite

# Phase 7 placeholder workflow. Not wired into the merge queue yet — once
# integration + e2e are stable in CI we promote the unit job into ci.yml's
# `test` job and add integration + e2e there. See
# docs/testing/qa-runbook.md for the long-term shape.

on:
  pull_request:
    branches: [main]
    paths:
      - "tests/**"
      - "playwright.config.ts"
      - "vitest.integration.config.ts"
      - "bin/test-fluid-os.sh"
      - ".github/workflows/test.yml"

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: pnpm test:integration

  e2e:
    name: E2E smoke
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e tests
        run: pnpm test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: .test-results/playwright-html/
          retention-days: 7
